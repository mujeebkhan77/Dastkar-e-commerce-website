<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Dastkaar</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =========================
         Navbar
    ========================== -->
    <nav class="navbar">
        <h1 class="logo">Dastkaar</h1>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="cart.html">Cart</a></li>
            <li>
                <a href="cart.html">
                    Cart 🛒 <span id="cartCount">0</span>
                </a>
            </li>
        </ul>
    </nav>


    <!-- =========================
         Checkout Section
    ========================== -->
    <section class="product-detail">

        <div class="product-detail-container">

            <!-- Left: Order Summary -->
            <div class="product-detail-info">

                <h1>Checkout</h1>

                <div id="checkoutItems"></div>

                <h2 id="checkoutTotal">Total: $0</h2>

            </div>

            <!-- Right: Form -->
            <div class="product-detail-info">

                <h2>Customer Details</h2>
                <p id="formMessage"></p>
                <input type="text" placeholder="Full Name"><br><br>
                <select id="countryCode">
                    <option value="+93">Afghanistan (+93)</option>
                    <option value="+355">Albania (+355)</option>
                    <option value="+213">Algeria (+213)</option>
                    <option value="+1">USA (+1)</option>
                    <option value="+44">UK (+44)</option>
                    <option value="+91">India (+91)</option>
                    <option value="+92">Pakistan (+92)</option>
                    <option value="+971">UAE (+971)</option>
                    <option value="+966">Saudi Arabia (+966)</option>
                    <option value="+81">Japan (+81)</option>
                    <option value="+49">Germany (+49)</option>
                </select>

                <br><br>

                <input type="text" placeholder="Phone Number"><br><br> <input type="text" placeholder="Address"><br><br>

                <button id="placeOrderBtn" onclick="placeOrder()" disabled>
                    Place Order
                </button>
            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
